# Data paths
data:
  raw_images_dir: "data/raw/images"
  vessel_masks_dir: "data/raw/masks/vessels"
  ma_masks_dir: "data/raw/masks/microaneurysms"
  split_dir: "data/splits"
  processed_dir: "data/processed"
  labels_file: "data/disease_labels.csv"

# Model parameters
model:
  name: "DiseaseClassifier"
  in_channels: 3
  num_classes: 5          # Normal, DR, Glaucoma, Cataract, AMD
  features: [64, 128, 256, 512]
  diseases: ["Normal", "Diabetic Retinopathy", "Glaucoma", "Cataract", "Age-related Macular Degeneration"]

# Training hyperparameters
training:
  batch_size: 8
  epochs: 10
  learning_rate: 0.0001
  device: "cpu"
  num_workers: 0
  save_dir: "models"
  log_interval: 10

# Augmentations
augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotation: 30
  brightness_contrast: true
